<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduTime 認証</title>

<style>
body {
    font-family: sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: #1e293b;
    padding: 30px;
    border-radius: 16px;
    text-align: center;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h1 {
    font-size: 20px;
    margin-bottom: 10px;
}

p {
    font-size: 13px;
    color: #94a3b8;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 16px;
}

button {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}
</style>
</head>

<body>

<div class="container">
    <h1>EduTime</h1>
    <p>学校のために作られたタイムマネジメントタイマー</p>

    <input id="code" placeholder="プロダクトコード">
    <button onclick="submitCode()">認証</button>
</div>

<script>
// SHA-256（正しいコードのハッシュ）
const VALID_HASH = "1c8fc605dc01bac1a14c52e66bee5e873afafa35282b41f60315a246d0cf5f68"; 
// ↑ "edutime" のSHA-256（固定）

// 初回チェック
window.onload = () => {
    if (localStorage.getItem("auth") === "ok") {
        location.href = "time.html";
    }
};

// SHA-256生成
async function sha256(text) {
    const enc = new TextEncoder().encode(text);
    const hashBuffer = await crypto.subtle.digest("SHA-256", enc);
    return Array.from(new Uint8Array(hashBuffer))
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");
}

// 入力処理
async function submitCode() {
    const code = document.getElementById("code").value.trim().toLowerCase();

    if (!code) {
        alert("コードを入力してください");
        return;
    }

    const hash = await sha256(code);

    if (hash === VALID_HASH) {
        localStorage.setItem("auth", "ok");
        location.href = "time.html";
    } else {
        alert("コードが正しくありません");
    }
}
</script>

</body>
</html>
