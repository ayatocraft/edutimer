<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Nexis EduTimer</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
}

/* 設定画面 */
#setup{padding:20px}

/* タイマー画面 */
#timer{
  display:none;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.current{
  font-size:28px;
  margin-bottom:10px;
}

.big{
  font-size:64px;
  font-weight:bold;
}

.red{color:#ff4d4d}

.small{
  font-size:20px;
  opacity:0.8;
}

input,select{
  margin:5px;
  padding:5px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  margin:5px;
}
</style>
</head>
<body>

<!-- 設定 -->
<div id="setup">
  <h1>Nexis EduTimer</h1>

  <p>何時間目 <input id="periods" type="number" value="6"></p>
  <p>1コマ(分) <input id="lesson" type="number" value="45"></p>
  <p>準備時間(分) <input id="prep" type="number" value="5"></p>

  <h3>イベント</h3>
  <div id="events"></div>
  <button onclick="addEvent()">＋追加</button>

  <br><br>
  <button onclick="start()">開始</button>

  <h3>操作方法</h3>
  <p>
  ・画面タップ：次へ（強制切替）<br>
  ・遅れは自動で表示（赤）<br>
  ・start = 最初 / last = 最後<br>
  ・数字 = ○限のあと / 名前 = そのイベントのあと
   画面をキャストしてください 
  </p>
</div>

<!-- タイマー -->
<div id="timer" onclick="next()">
  <div id="current" class="current">--</div>
  <div id="remaining" class="big">--:--</div>
  <div id="next" class="small">次：--</div>
  <div id="clock" class="small"></div>
</div>

<script>
let schedule = [];
let currentIndex = 0;

/* イベント追加 */
function addEvent(){
  const div=document.createElement("div");
  div.innerHTML=`
    <select>
      <option>給食</option>
      <option>朝の会</option>
      <option>朝活</option>
      <option>帰りの会</option>
      <option>掃除</option>
      <option>休憩</option>
    </select>
    あと:
    <input placeholder="例:start / 4 / 給食 / last">
    分:
    <input type="number" value="30">
  `;
  events.appendChild(div);
}

/* スケジュール生成 */
function buildSchedule(config){
  let base=[];

  // 授業ベース
  for(let i=1;i<=config.periods;i++){
    base.push({name:i+"限目",duration:config.lesson});
    base.push({name:"準備時間",duration:config.prep});
  }

  // イベント挿入
  config.events.forEach(ev=>{
    if(ev.after==="start"){
      base.unshift({name:ev.type,duration:ev.duration});
      return;
    }
    if(ev.after==="last"){
      base.push({name:ev.type,duration:ev.duration});
      return;
    }

    let idx=base.findIndex(x=>x.name.includes(ev.after));
    if(idx!==-1){
      base.splice(idx+1,0,{name:ev.type,duration:ev.duration});
    }
  });

  // 時刻付与
  let now=Date.now();
  let expected=now;

  return base.map(item=>{
    let obj={
      name:item.name,
      duration:item.duration*60000,
      expectedStart:expected,
      expectedEnd:expected+item.duration*60000,
      actualStart:now,
      actualEnd:null
    };
    expected+=item.duration*60000;
    now+=item.duration*60000;
    return obj;
  });
}

/* 開始 */
function start(){
  const config={
    periods:+periods.value,
    lesson:+lesson.value,
    prep:+prep.value,
    events:[]
  };

  document.querySelectorAll("#events>div").forEach(div=>{
    const type=div.querySelector("select").value;
    const after=div.querySelectorAll("input")[0].value;
    const dur=+div.querySelectorAll("input")[1].value;

    config.events.push({type,after,duration:dur});
  });

  localStorage.setItem("eduConfig",JSON.stringify(config));

  schedule=buildSchedule(config);
  currentIndex=0;
  schedule[0].actualStart=Date.now();

  setup.style.display="none";
  timer.style.display="flex";

  setInterval(update,1000);
}

/* 更新 */
function update(){
  if(currentIndex>=schedule.length)return;

  const now=Date.now();
  const cur=schedule[currentIndex];

  let end=cur.actualStart+cur.duration;
  let remain=end-now;

  if(remain<=0){
    next();
    return;
  }

  // 表示
  current.textContent=cur.name;

  let text=format(remain);
  remaining.textContent="あと "+text;

  // 遅れ
  let delay=now-cur.expectedEnd;
  if(delay>0){
    remaining.classList.add("red");
  }else{
    remaining.classList.remove("red");
  }

  next.textContent="次："+(schedule[currentIndex+1]?.name||"終了");

  clock.textContent=new Date().toLocaleTimeString();
}

/* 次へ */
function next(){
  if(currentIndex>=schedule.length)return;

  let now=Date.now();
  schedule[currentIndex].actualEnd=now;

  currentIndex++;
  if(currentIndex>=schedule.length)return;

  schedule[currentIndex].actualStart=now;
}

/* フォーマット */
function format(ms){
  let s=Math.floor(ms/1000);
  let m=Math.floor(s/60);
  s%=60;
  return m+"分"+s+"秒";
}

/* 保存読み込み */
const saved=localStorage.getItem("eduConfig");
if(saved){
  const cfg=JSON.parse(saved);
  periods.value=cfg.periods;
  lesson.value=cfg.lesson;
  prep.value=cfg.prep;
}
</script>

</body>
</html>
